<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,'Microsoft YaHei',sans-serif;padding:14px;font-size:13px;}
.top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.top input{padding:7px 10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:15px;width:140px;text-align:center;}
.top input:focus{border-color:#58a6ff;outline:none;}
.top button{padding:7px 14px;background:#1f6feb;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;}
.pb{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:10px;}
.pr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.pn{font-size:16px;color:#8b949e;}.pp{font-size:36px;font-weight:700;}.pc{font-size:15px;margin-left:6px;}
.up{color:#f85149;}.down{color:#3fb950;}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.tag{display:inline-block;padding:1px 8px;border-radius:3px;font-size:11px;font-weight:600;}
.tr{background:rgba(248,81,73,0.15);color:#f85149;}.tg{background:rgba(63,185,80,0.15);color:#3fb950;}.tb{background:rgba(88,166,255,0.15);color:#58a6ff;}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:5px;margin-top:8px;}
.di{text-align:center;padding:5px;background:#0d1117;border-radius:5px;}
.di .l{font-size:9px;color:#8b949e;}.di .v{font-size:13px;font-weight:600;margin-top:1px;}
.nav{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.nav button{padding:5px 12px;border:1px solid #30363d;background:#161b22;color:#e6edf3;border-radius:5px;cursor:pointer;font-size:12px;}
.nav button.active{background:#1f6feb;border-color:#1f6feb;}
.panel{display:none;}.panel.active{display:block;}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:8px;}
.card h2{font-size:13px;color:#58a6ff;margin-bottom:8px;border-bottom:1px solid #21262d;padding-bottom:5px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{padding:4px 3px;text-align:left;border-bottom:1px solid #21262d;}
th{color:#8b949e;font-weight:400;white-space:nowrap;}
tr:hover{background:#1c2129;}
.di2{font-size:11px;color:#8b949e;background:#0d1117;padding:6px 8px;border-radius:5px;margin-top:5px;border-left:3px solid #58a6ff;}
.ind{display:inline-block;padding:1px 5px;border-radius:2px;font-size:10px;font-weight:600;}
.ir{background:rgba(248,81,73,0.15);color:#f85149;}.ig{background:rgba(63,185,80,0.15);color:#3fb950;}.in{background:rgba(139,148,158,0.15);color:#8b949e;}
.s2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:600px){.s2{grid-template-columns:1fr;}}
.loader{display:inline-block;width:14px;height:14px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:s 0.6s linear infinite;vertical-align:middle;}
@keyframes s{to{transform:rotate(360deg);}}
</style></head>

sc.onload=function(){setTimeout(function(){var v=window['v_'+pfx+code];if(v&&v.length>20)parseRT(v);else document.getElementById('dinfo').textContent='⚠️ 未找到';},300);};
sc.onerror=function(){document.getElementById('dinfo').textContent='⚠️ 网络错误';};
document.head.appendChild(sc);setTimeout(function(){try{document.head.removeChild(sc)}catch(e){}},2000);}

function parseRT(r){var p=r.split('~'),nm=p[1],pr=+p[3],pre=+p[4],op=+p[5],hi=+p[33]||0,lo=+p[34]||0;
var vl=+p[6]||0,am=+p[37]||0,vr=+p[49]||0,pe0=+p[39]||0,mc=+p[45]||0,tr=+p[38]||0;
var cg=pr-pre,cp=(cg/pre*100),up=cg>=0,b1v=+p[7]||0,s1v=+p[9]||0,tb=0,ts=0;
for(var i=0;i<5;i++){if(p[11+i*2])tb+=+p[11+i*2]||0;if(p[23+i*2])ts+=+p[23+i*2]||0;}
curName=nm;
document.getElementById('pname').textContent=nm+'('+curCode+')';
document.getElementById('pprice').textContent=pr.toFixed(2);document.getElementById('pprice').style.color=up?'#f85149':'#3fb950';
document.getElementById('pchg').textContent=(cg>0?'+':'')+cg.toFixed(2)+' ('+(cp>0?'+':'')+cp.toFixed(2)+'%)';
document.getElementById('pchg').style.color=up?'#f85149':'#3fb950';
document.getElementById('pop').textContent=op.toFixed(2);document.getElementById('ppre').textContent=pre.toFixed(2);
document.getElementById('tags').innerHTML='<span class=tag '+(up?'tr':'tg')+'>'+(up?'📈涨':'📉跌')+cp.toFixed(2)+'%</span><span class=tag '+(vr>=1?'tr':'tg')+'>量比'+vr.toFixed(2)+'</span><span class=tag tb>换手'+tr+'%</span><span class=tag '+(pe0<20?'tg':'tr')+'>PE'+pe0+'</span>';
document.getElementById('det').innerHTML='<div class=di><div class=l>最高</div><div class="v up">'+hi.toFixed(2)+'</div></div><div class=di><div class=l>最低</div><div class="v down">'+lo.toFixed(2)+'</div></div><div class=di><div class=l>开/昨</div><div class=v>'+op.toFixed(2)+'/'+pre.toFixed(2)+'</div></div><div class=di><div class=l>量比</div><div class=v>'+vr.toFixed(2)+'</div></div><div class=di><div class=l>换手</div><div class=v>'+tr+'%</div></div><div class=di><div class=l>PE</div><div class=v>'+pe0+'</div></div><div class=di><div class=l>市值</div><div class=v>'+(mc||0).toFixed(1)+'亿</div></div><div class=di><div class=l>成交额</div><div class=v>'+(am>100000?(am/100000000).toFixed(2)+'亿':(am/10000).toFixed(0)+'万')+'</div></div>';
document.getElementById('dinfo').textContent='🔄 '+new Date().toLocaleTimeString('zh-CN')+' 腾讯行情';
document.getElementById('b1').textContent=b1v?b1v.toLocaleString():'--';
document.getElementById('s1').textContent=s1v?s1v.toLocaleString():'--';
var rr=ts>0?tb/ts:0;document.getElementById('bsr').textContent=rr>0?rr.toFixed(2):'--';
document.getElementById('bsr').style.color=rr>1?'#f85149':'#3fb950';
document.getElementById('tbuy').textContent=tb?tb.toLocaleString():'--';
document.getElementById('tsell').textContent=ts?ts.toLocaleString():'--';
document.getElementById('emo').textContent=rr>1.2?'🔥买方强':rr>0.8?'📊均衡':'❄️卖方强';
document.getElementById('emo').style.color=rr>1?'#f85149':'#3fb950';
calcScore(cp,vr,tr,rr,pr,pre);showLHB(curCode,nm);}

function calcScore(cp,vr,tr,rr,pr,pre){
var s1=Math.min(100,Math.round(50+cp*3+(pr-(pre||50))*0.5));
var s2=Math.min(100,Math.round(40+(vr||1)*10));
var s3=Math.min(100,Math.round(50+Math.min(rr*20,30)));
var s4=Math.min(100,Math.round(55+cp*1.5));
var t=Math.round((s1+s2+s3+s4)/4);
for(var _i=0,_a=[['sc1',s1],['sc2',s2],['sc3',s3],['sc4',s4]];_i<_a.length;_i++){var id=_a[_i][0],v=_a[_i][1];document.getElementById(id).textContent=v;document.getElementById(id).style.color=v>=60?'#f85149':v<=40?'#3fb950':'#e6edf3';}
document.getElementById('sc1l').textContent=s1>=60?'↑强':'↓弱';
document.getElementById('sc2l').textContent=s2>=60?'📊放量':'📉缩';
document.getElementById('sc3l').textContent=s3>=60?'🔥强':'❄️弱';
document.getElementById('sc4l').textContent=s4>=60?'📈偏强':'📉偏弱';
for(var _i2=0,_a2=['sc1l','sc2l','sc3l','sc4l'];_i2<_a2.length;_i2++){var txt=document.getElementById(_a2[_i2]).textContent;document.getElementById(_a2[_i2]).style.color=/(强|放量|活跃|偏强)/.test(txt)?'#f85149':'#3fb950';}
document.getElementById('ts').textContent=t;document.getElementById('ts').style.color=t>=60?'#f85149':t<=40?'#3fb950':'#e6edf3';
document.getElementById('tl').textContent=t>=60?'偏多':t<=40?'偏空':'中性';
if(t>=70)document.getElementById('sug').textContent='📈 整体偏多，趋势强势。短线注意前高压力，中线关注中报。';
else if(t>=50)document.getElementById('sug').textContent='📊 中性偏多，短期涨幅较大有回调需求，不追高。';
else document.getElementById('sug').textContent='📉 偏空，建议观望。';}

function showLHB(code,name){

document.getElementById('lhbt').textContent=' — '+name+'('+code+')';
var det=LHB_DET[code],h='';
if(det){
h+='<div style=background:#0d1117;padding:8px;border-radius:5px;margin-bottom:8px;><div style=font-size:12px;color:#58a6ff;margin-bottom:4px;>📥 买入前5</div><table><tr><th>#</th><th>营业部</th><th>买入额</th><th>占比</th><th>净额</th></tr>';
det.buy.forEach(function(r){var a=(+r['买入金额']/1e8).toFixed(2),n=(+r['净额']/1e8).toFixed(2),p=(+r['买入金额-占总成交比例']*100).toFixed(2);
h+='<tr><td>'+r['序号']+'</td><td style=max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; title='+r['交易营业部名称']+'>'+r['交易营业部名称']+'</td><td class=up>'+a+'亿</td><td>'+p+'%</td><td class='+(n>=0?'up':'down')+'>'+n+'亿</td></tr>';});
h+='</table></div><div style=background:#0d1117;padding:8px;border-radius:5px;margin-bottom:8px;><div style=font-size:12px;color:#58a6ff;margin-bottom:4px;>📤 卖出前5</div><table><tr><th>#</th><th>营业部</th><th>买入额</th><th>占比</th><th>净额</th></tr>';
det.sell.forEach(function(r){var a=(+r['买入金额']/1e8).toFixed(2),n=(+r['净额']/1e8).toFixed(2),p=(+r['买入金额-占总成交比例']*100).toFixed(2);
h+='<tr><td>'+r['序号']+'</td><td style=max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; title='+r['交易营业部名称']+'>'+r['交易营业部名称']+'</td><td class=down>'+a+'亿</td><td>'+p+'%</td><td class='+(n>=0?'up':'down')+'>'+n+'亿</td></tr>';});
h+='</table></div>';}
if(items.length===0){
h+='<table><tr><th>股票</th><th>解读</th></tr><tr><td colspan=2 style=text-align:center;color:#8b949e;>近3日未上龙虎榜</td></tr></table>';}else{
h+='<table><tr><th>股票</th><th>解读</th><th>方向</th></tr>';
items.forEach(function(i){var b=i.desc.includes('买入')||i.desc.includes('主买'),s=i.desc.includes('卖出')||i.desc.includes('主卖');
h+='<tr><td>'+i.name+'</td><td>'+i.desc+'</td><td class='+(b?'up':s?'down':'')+'>'+(b?'📥买入':s?'📤卖出':'🔄做T')+'</td></tr>';});
h+='</table>';}
document.getElementById('lhbdata').innerHTML=h;
var ul='<table><tr><th>代码</th><th>名称</th><th>解读</th><th>方向</th></tr>';
LHB.forEach(function(i){var b=i.desc.includes('买入')||i.desc.includes('主买'),s=i.desc.includes('卖出')||i.desc.includes('主卖');
var hl=(i.code===code)?'style=background:#1f6feb22;':'';ul+='<tr '+hl+'><td>'+i.code+'</td><td>'+i.name+'</td><td>'+i.desc+'</td><td class='+(b?'up':s?'down':'')+'>'+(b?'📥':s?'📤':'🔄')+'</td></tr>';});
document.getElementById('lhbAll').innerHTML=ul+'</table>';}

async function loadKLine(code){var pfx=code.startsWith('6')?'sh':'sz';
try{var resp=await fetch('https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param='+pfx+code+',day,,,60,qfq');
var data=await resp.json(),kd=data.data[pfx+code];
var karr=kd?kd.qfqday||kd.day:null;
if(!karr||karr.length<5){document.getElementById('techSt').innerHTML='<span style=color:#f85149;>数据不足</span>';showSimple();return;}
document.getElementById('techSt').innerHTML='<span style=color:#3fb950;>✔</span> '+karr.length+'天';
var c=karr.map(function(r){return+r[4];}),lc=c[c.length-1];
setMA(c,5,'ma5',lc);setMA(c,10,'ma10',lc);setMA(c,20,'ma20',lc);setMA(c,60,'ma60',lc);
var e12=[c[0]],e26=[c[0]];
for(var i=1;i<c.length;i++){e12.push(e12[i-1]*11/13+c[i]*2/13);e26.push(e26[i-1]*25/27+c[i]*2/27);}
var dif=e12[e12.length-1]-e26[e26.length-1];
var dea=dif;for(var i=Math.max(0,c.length-9);i<c.length;i++){var d2=e12[i]-e26[i];dea=dea*8/10+d2*2/10;}
var bar=dif-dea;
document.getElementById('mdif').textContent=dif.toFixed(2);document.getElementById('mdea').textContent=dea.toFixed(2);document.getElementById('mbar').textContent=bar.toFixed(2);
document.getElementById('macds').textContent=dif>dea?'↑金叉':'↓死叉';
document.getElementById('macds').className='ind '+(dif>dea?'ir':'ig');
document.getElementById('mbars').textContent=bar>0?'🔴多头':'🟢空头';
document.getElementById('mbars').className='ind '+(bar>0?'ir':'ig');
var r6=calcRSI(c,6),r14=calcRSI(c,14);
document.getElementById('r6').textContent=r6.toFixed(1);document.getElementById('r14').textContent=r14.toFixed(1);
document.getElementById('r6s').textContent=r6>70?'⚡超买':r6<30?'🔋超卖':'➕中性';
document.getElementById('r6s').className='ind '+(r6>70?'ir':r6<30?'ig':'in');
document.getElementById('r14s').textContent=r14>70?'⚡超买':r14<30?'🔋超卖':'➕中性';
document.getElementById('r14s').className='ind '+(r14>70?'ir':r14<30?'ig':'in');
var n20=c.slice(-20),bm=n20.reduce(function(a,b){return a+b;},0)/20;
var bv=n20.reduce(function(s,v){return s+(v-bm)**2;},0)/20;
document.getElementById('bu').textContent=(bm+2*Math.sqrt(bv)).toFixed(2);
document.getElementById('bm').textContent=bm.toFixed(2);
document.getElementById('bl').textContent=(bm-2*Math.sqrt(bv)).toFixed(2);
document.getElementById('bolls').textContent=lc>bm+2*Math.sqrt(bv)?'☝突破上轨':lc<bm-2*Math.sqrt(bv)?'👇贬破下轨':'↔通道内';
document.getElementById('bolls').className='ind '+(lc>bm+2*Math.sqrt(bv)?'ir':lc<bm-2*Math.sqrt(bv)?'ig':'in');
drawCmp(kd.qfqday);}catch(e){document.getElementById('techSt').innerHTML='<span style=color:#f85149;>K线加载失败</span>';showSimple();}}

function setMA(arr,n,id,cur){var s=0;for(var i=arr.length-n;i<arr.length;i++)s+=arr[i];var v=s/n;document.getElementById(id).textContent=v.toFixed(2);document.getElementById(id+'s').textContent=cur>v?'↑多头':'↓空头';document.getElementById(id+'s').className='ind '+(cur>v?'ir':'ig');}

function calcRSI(p,n){if(p.length<n+1)return 50;var g=0,l=0;
for(var i=1;i<=n;i++){var d=p[i]-p[i-1];if(d>0)g+=d;else l-=d;}
var ag=g/n,al=l/n;
for(var i=n+1;i<p.length;i++){var d=p[i]-p[i-1];if(d>0){ag=(ag*(n-1)+d)/n;al=al*(n-1)/n;}else{ag=ag*(n-1)/n;al=(al*(n-1)-d)/n;}}
if(al===0)return 100;return 100-100/(1+ag/al);}

function showSimple(){for(var _i=0,_a=['ma5','ma10','ma20','ma60','mdif','mdea','mbar','r6','r14','bu','bm','bl'];_i<_a.length;_i++)document.getElementById(_a[_i]).textContent='--';
for(var _i2=0,_a2=['ma5s','ma10s','ma20s','ma60s','macds','mbars','r6s','r14s','bolls'];_i2<_a2.length;_i2++)document.getElementById(_a2[_i2]).textContent='缺数据';}
function drawCmp(raw){
if(!raw||raw.length<5){document.getElementById('cmpInfo').textContent='数据不足';return;}
var c=raw.map(function(r){return+r[4];}),chg=((c[c.length-1]/c[0]-1)*100).toFixed(2);
document.getElementById('cmpInfo').innerHTML='本股60日涨幅: '+chg+'% | 获取沪深300对比...';
fetch('https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=sh000300,day,,,60,qfq').then(function(r){return r.json();}).then(function(d){
var raw2=d.data.sh000300;
var harr=raw2?raw2.qfqday||raw2.day:null;
if(!harr||harr.length<5){document.getElementById('cmpInfo').textContent='沪深300数据不足';return;}
var h=harr.map(function(r){return+r[4];});
if(h.length<5){document.getElementById('cmpInfo').textContent='沪深300数据不足';return;}
var hchg=((h[h.length-1]/h[0]-1)*100).toFixed(2),diff=(chg-hchg).toFixed(2);
document.getElementById('cmpInfo').innerHTML='本股 <b>'+chg+'%</b> | 沪深300 <b>'+hchg+'%</b> | 强弱 <b>'+(diff>0?'📈跑赢':'📉跑输')+' '+Math.abs(diff)+'%</b>';
document.getElementById('cmpData').innerHTML='<div class=di><div class=l>起始价</div><div class=v>'+c[0].toFixed(2)+'</div></div><div class=di><div class=l>最新价</div><div class="v '+(chg>=0?'up':'down')+'">'+c[c.length-1].toFixed(2)+'</div></div><div class=di><div class=l>本股涨幅</div><div class="v '+(chg>=0?'up':'down')+'">'+chg+'%</div></div><div class=di><div class=l>HS300涨幅</div><div class="v '+(hchg>=0?'up':'down')+'">'+hchg+'%</div></div><div class=di><div class=l>60日最高</div><div class="v up">'+Math.max.apply(null,c).toFixed(2)+'</div></div><div class=di><div class=l>60日最低</div><div class="v down">'+Math.min.apply(null,c).toFixed(2)+'</div></div>';})
['catch'](function(){document.getElementById('cmpInfo').textContent='对比加载失败（网络或CORS）';});}

function loadIdx(){var sc=document.createElement('script');sc.src='https://qt.gtimg.cn/q=sh000001,sz399001,sz399006,sh000300';
sc.onload=function(){setTimeout(function(){var ids=[['sh000001','上证'],['sz399001','深证'],['sz399006','创业板'],['sh000300','HS300']],h='';
for(var i=0;i<ids.length;i++){var k=ids[i][0],n=ids[i][1],v=window['v_'+k];if(!v)continue;var p=v.split('~'),pr=+p[3],pre=+p[4],cg=pr-pre,cp=(cg/pre*100);
h+='<div class=di><div class=l>'+n+'</div><div class="v '+(cg>=0?'up':'down')+'">'+pr.toFixed(1)+' '+(cg>0?'+':'')+cp.toFixed(2)+'%</div></div>';}
document.getElementById('idxg').innerHTML=h;},300);};document.head.appendChild(sc);}

function sw(n){document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
document.getElementById('p'+n).classList.add('active');
document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active');});
var m={tech:0,score:1,lhb:2,cmp:3};if(document.querySelectorAll('.nav button')[m[n]])document.querySelectorAll('.nav button')[m[n]].classList.add('active');}

search();loadIdx();setInterval(function(){loadRT(curCode);if(curCode&&curName)showLHB(curCode,curName);},30000);
</script></body></html>
